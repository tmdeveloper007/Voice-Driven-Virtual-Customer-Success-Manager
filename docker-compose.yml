version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/vcsmdb
      - SPRING_DATASOURCE_USERNAME=vcsmuser
      - SPRING_DATASOURCE_PASSWORD=vcsmsecret
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=vcsmdb
      - POSTGRES_USER=vcsmuser
      - POSTGRES_PASSWORD=vcsmsecret
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcsmuser -d vcsmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
