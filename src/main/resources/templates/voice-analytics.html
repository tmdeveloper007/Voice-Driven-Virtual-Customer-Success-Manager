<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Analytics - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="/css/style.css" rel="stylesheet">
</head>
<body>


    <link href="/src/main/resources/static/css/mainfile.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand" href="/">VCSM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link active" href="/voice-analytics">Voice Analytics</a>

            <a class="nav-link" href="/voice-analytics">Voice Analytics</a>

        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4><i class="fas fa-chart-line text-purple me-2"></i>Voice Command Analytics</h4>
    
    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h3 id="totalCommands">-</h3>
                    <p>Total Commands</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h3 id="uniqueUsers">-</h3>
                    <p>Active Users</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h3 id="successRate">-<span style="font-size: 16px;">%</span></h3>
                    <p>Success Rate</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h3 id="avgResponseTime">-<span style="font-size: 16px;">ms</span></h3>
                    <p>Avg Response</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Charts -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">Commands by Intent</div>
                <div class="card-body">
                    <canvas id="intentChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">Usage by Hour</div>
                <div class="card-body">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    fetch('/api/analytics/voice/summary')
        .then(r => r.json())
        .then(data => {
            document.getElementById('totalCommands').innerText = data.totalCommands || 0;
            document.getElementById('uniqueUsers').innerText = data.uniqueUsers || 0;
            document.getElementById('successRate').innerHTML = (data.successRate || 0) + '<span style="font-size:16px;">%</span>';
            document.getElementById('avgResponseTime').innerHTML = (data.averageResponseTime || 0) + '<span style="font-size:16px;">ms</span>';
        });
    
    fetch('/api/analytics/voice/commands')
        .then(r => r.json())
        .then(data => {
            new Chart(document.getElementById('intentChart'), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.intent),
                    datasets: [{
                        label: 'Commands',
                        data: data.map(d => d.count),
                        backgroundColor: '#8b5cf6'
                    }]
                }
            });
        });
    
    fetch('/api/analytics/voice/hourly')
        .then(r => r.json())
        .then(data => {
            new Chart(document.getElementById('hourlyChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.label),
                    datasets: [{
                        label: 'Commands',
                        data: data.map(d => d.count),
                        borderColor: '#8b5cf6',
                        fill: false
                    }]
                }
            });
        });
</script>
</body>
</html>
