<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand" href="/">VCSM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link active" href="/audit-logs">Audit Logs</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4><i class="fas fa-clipboard-list text-purple me-2"></i>Audit Logs</h4>
    
    <!-- Stats -->
    <div class="row g-3 mb-4" id="statsContainer">
        <div class="col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h4 id="totalLogs">-</h4>
                    <p>Total Actions</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Filter -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search logs...">
                </div>
                <div class="col-md-3">
                    <select id="actionFilter" class="form-select">
                        <option value="">All Actions</option>
                        <option value="UPDATE_STATUS">Update Status</option>
                        <option value="DELETE_COMPLAINT">Delete Complaint</option>
                        <option value="UPDATE_PRIORITY">Update Priority</option>
                        <option value="BULK_RESOLVE">Bulk Resolve</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="applyFilters()">
                        <i class="fas fa-search me-1"></i> Filter
                    </button>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-secondary w-100" onclick="resetFilters()">
                        <i class="fas fa-undo me-1"></i> Reset
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Logs Table -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Admin</th>
                        <th>Action</th>
                        <th>Description</th>
                        <th>Target</th>
                        <th>Changes</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/toast-notifications.js"></script>
<script>
    function loadLogs() {
        fetch('/api/audit/logs')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('logsTableBody');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No audit logs found.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(log => `
                    <tr>
                        <td>${log.id}</td>
                        <td>${log.adminEmail || 'System'}</td>
                        <td><span class="badge bg-${getBadgeColor(log.actionType)}">${log.actionType}</span></td>
                        <td>${log.description}</td>
                        <td>${log.targetType || '-'}#${log.targetId || ''}</td>
                        <td>${log.oldValue ? log.oldValue + ' → ' + log.newValue : '-'}</td>
                        <td>${new Date(log.createdAt).toLocaleString()}</td>
                    </tr>
                `).join('');
            })
            .catch(err => {
                console.error('Error loading logs:', err);
                document.getElementById('logsTableBody').innerHTML = 
                    '<tr><td colspan="7" class="text-center text-danger py-4">Failed to load logs</td></tr>';
            });
    }
    
    function loadStats() {
        fetch('/api/audit/logs/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('totalLogs').textContent = data.total || 0;
            })
            .catch(err => console.error('Error loading stats:', err));
    }
    
    function getBadgeColor(action) {
        const colors = {
            'UPDATE_STATUS': 'info',
            'DELETE_COMPLAINT': 'danger',
            'UPDATE_PRIORITY': 'warning',
            'BULK_RESOLVE': 'success'
        };
        return colors[action] || 'secondary';
    }
    
    function applyFilters() {
        // TODO: Implement filter functionality
        toast.info('Filter applied', 'Info');
    }
    
    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('actionFilter').value = '';
        loadLogs();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadLogs();
        loadStats();
    });
</script>
</body>
</html>
