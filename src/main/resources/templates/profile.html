<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/src/main/resources/static/css/mainfile.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand" href="/">VCSM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link" href="/analytics">Analytics</a>
            <a class="nav-link active" href="/profile">Profile</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- Profile Sidebar -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle" style="font-size: 80px; color: #8b5cf6;"></i>
                    </div>
                    <h5 id="profileName" class="mt-2">Loading...</h5>
                    <p id="profileEmail" class="text-muted">Loading...</p>
                    <button class="btn btn-sm btn-outline-purple w-100" onclick="editProfile()">
                        <i class="fas fa-edit"></i> Edit Profile
                    </button>
                </div>
            </div>
            
            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <h6><i class="fas fa-chart-simple text-purple me-2"></i>Statistics</h6>
                    <div id="userStats">
                        <p class="text-muted">Loading stats...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Activity Feed -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-clock text-purple me-2"></i>Activity Timeline</span>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterActivity('all')">All</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterActivity('COMPLAINT')">Complaints</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterActivity('EVENT')">Events</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterActivity('VOICE')">Voice</button>
                    </div>
                </div>
                <div class="card-body" id="activityFeed">
                    <p class="text-muted text-center">Loading activities...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const userId = 1; // Replace with actual logged-in user ID
    
    function loadProfile() {
        fetch(`/api/users/${userId}/profile`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('profileName').textContent = data.name;
                document.getElementById('profileEmail').textContent = data.email;
            });
    }
    
    function loadStats() {
        fetch(`/api/users/${userId}/stats`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('userStats').innerHTML = `
                    <p><strong>Total Activities:</strong> ${data.totalActivities || 0}</p>
                    <p><strong>Voice Enrolled:</strong> ${data.isVoiceEnrolled ? '✅ Yes' : '❌ No'}</p>
                    <p><strong>Last Active:</strong> ${data.lastActive ? new Date(data.lastActive).toLocaleDateString() : 'Never'}</p>
                    <p><strong>Member Since:</strong> ${data.memberSince ? new Date(data.memberSince).toLocaleDateString() : 'N/A'}</p>
                `;
            });
    }
    
    function loadActivities(filter = 'all') {
        const url = filter === 'all' 
            ? `/api/users/${userId}/activity` 
            : `/api/users/${userId}/activity/${filter}`;
        
        fetch(url)
            .then(r => r.json())
            .then(data => {
                const feed = document.getElementById('activityFeed');
                const activities = Array.isArray(data) ? data : (data && Array.isArray(data.content) ? data.content : []);
                if (activities.length === 0) {
                    feed.innerHTML = '<p class="text-muted text-center">No activities found.</p>';
                    return;
                }
                
                feed.innerHTML = activities.map(a => `
                    <div class="activity-item border-bottom pb-2 mb-2">
                        <div class="d-flex justify-content-between">
                            <span class="badge bg-${a.actionType === 'COMPLAINT' ? 'danger' : 
                                                      a.actionType === 'EVENT' ? 'success' : 
                                                      a.actionType === 'VOICE' ? 'info' : 'secondary'}">
                                ${a.actionType}
                            </span>
                            <small class="text-muted">${new Date(a.createdAt).toLocaleString()}</small>
                        </div>
                        <p class="mb-0">${a.description}</p>
                    </div>
                `).join('');
            });
    }
    
    function filterActivity(type) {
        loadActivities(type);
    }
    
    function editProfile() {
        const name = prompt('Enter new name:', document.getElementById('profileName').textContent);
        if (name) {
            fetch(`/api/users/${userId}/profile`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('Profile updated!');
                    loadProfile();
                    loadActivities();
                }
            });
        }
    }
    
    // Load all data on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadProfile();
        loadStats();
        loadActivities();
    });
</script>
</body>
</html>
