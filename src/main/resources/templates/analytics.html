<body>

    <div class="spinner"></div>
</div>

<div class="container mt-4">
    <h4 class="fw-bold mb-4"><i class="fas fa-chart-bar text-purple me-2"></i>Community Analytics</h4>

    <!-- Stats Cards - Responsive grid -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm border-0 stat-card">
                <div class="card-body">
                    <div class="stat-icon bg-purple-soft mb-2">
                        <i class="fas fa-chart-line text-purple"></i>
                    </div>
                    <h2 class="fw-bold text-purple" th:text="${complaintStats.total}">0</h2>
                    <p class="text-muted mb-0 small">Total Complaints</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm border-0 stat-card">
                <div class="card-body">
                    <div class="stat-icon bg-success-soft mb-2">
                        <i class="fas fa-check-circle text-success"></i>
                    </div>
                    <h2 class="fw-bold text-success" th:text="${complaintStats.resolved}">0</h2>
                    <p class="text-muted mb-0 small">Resolved</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm border-0 stat-card">
                <div class="card-body">
                    <div class="stat-icon bg-info-soft mb-2">
                        <i class="fas fa-calendar-alt text-info"></i>
                    </div>
                    <h2 class="fw-bold text-info" th:text="${totalEvents}">0</h2>
                    <p class="text-muted mb-0 small">Total Events</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm border-0 stat-card">
                <div class="card-body">
                    <div class="stat-icon bg-warning-soft mb-2">
                        <i class="fas fa-calendar-check text-warning"></i>
                    </div>
                    <h2 class="fw-bold text-warning" th:text="${activeEvents}">0</h2>
                    <p class="text-muted mb-0 small">Active Events</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row - Stacks on mobile -->
    <div class="row g-3">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Complaints by Status</div>
                <div class="card-body" id="statusChartContainer">
                    <div class="skeleton skeleton-card" style="height: 300px;"></div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Complaints by Category</div>
                <div class="card-body" id="categoryChartContainer">
                    <div class="skeleton skeleton-card" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 text-center text-muted">
    <small>Voice-Driven Virtual Customer Success Manager &bull; Built with Spring Boot &amp; Omnidim.io</small>
</footer>

<!-- JavaScript Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/spinners.js"></script>
<script src="/js/shortcuts.js"></script>
<script src="/js/back-to-top.js"></script>
<script src="/js/toast-notifications.js"></script>
<script src="/js/typing-indicator.js"></script>
<script src="/js/confirm-dialogs.js"></script>

<script th:inline="javascript">
    // Initialize toast for notifications
    if (typeof toast !== 'undefined') {
        window.toast = toast;
    }
    
    // Hide spinner when page loads
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const spinner = document.getElementById('pageSpinner');
            if (spinner) {
                spinner.classList.remove('active');
            }
        }, 500);
        
        // Show welcome toast
        setTimeout(function() {
            if (typeof toast !== 'undefined') {
                toast.info('Welcome to Analytics Dashboard!', '📊 Analytics');
            }
        }, 1000);
    });

    const stats = {
        open: /*[[${complaintStats.open}]]*/ 0,
        inProgress: /*[[${complaintStats.inProgress}]]*/ 0,
        resolved: /*[[${complaintStats.resolved}]]*/ 0,
        closed: /*[[${complaintStats.closed}]]*/ 0
    };

    // Show spinner while loading charts
    if (window.spinnerManager) {
        window.spinnerManager.showOverlay();
    }

    // Status Chart
    const statusCtx = document.createElement('canvas');
    document.getElementById('statusChartContainer').innerHTML = '';
    document.getElementById('statusChartContainer').appendChild(statusCtx);
    
    new Chart(statusCtx, {
        type: 'doughnut',
        data: {
            labels: ['Open', 'In Progress', 'Resolved', 'Closed'],
            datasets: [{
                data: [stats.open, stats.inProgress, stats.resolved, stats.closed],
                backgroundColor: ['#dc3545', '#ffc107', '#28a745', '#6c757d'],
                borderWidth: 0,
                hoverOffset: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { font: { size: 12 } }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.raw || 0;
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const percentage = total > 0 ? Math.round((value / total) * 100) : 0;
                            return `${label}: ${value} (${percentage}%)`;
                        }
                    }
                }
            },
            animation: {
                animateScale: true,
                animateRotate: true
            }
        }
    });

    // Category Chart with loading indicator
    fetch('/api/analytics')
        .then(r => r.json())
        .then(data => {
            const cats = data.complaintsByCategory || {};
            const categoryCtx = document.createElement('canvas');
            document.getElementById('categoryChartContainer').innerHTML = '';
            document.getElementById('categoryChartContainer').appendChild(categoryCtx);
            
            new Chart(categoryCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        label: 'Complaints',
                        data: Object.values(cats),
                        backgroundColor: '#8b5cf6',
                        borderRadius: 8,
                        hoverBackgroundColor: '#7c3aed'
                    }]
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Complaints: ${context.raw}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            ticks: { font: { size: 10 }, rotation: 45 },
                            grid: { display: false }
                        },
                        y: { 
                            ticks: { stepSize: 1 },
                            grid: { color: '#e5e7eb' }
                        }
                    },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    }
                }
            });
            
            // Hide spinner after charts load
            if (window.spinnerManager) {
                window.spinnerManager.hideOverlay();
            }
            
            // Show success toast
            if (typeof toast !== 'undefined') {
                toast.success('Analytics data loaded successfully!', '📈 Data Ready');
            }
        })
        .catch(error => {
            console.error('Error loading analytics:', error);
            document.getElementById('categoryChartContainer').innerHTML = 
                '<div class="alert alert-danger">Failed to load category data. Please refresh.</div>';
            if (window.spinnerManager) {
                window.spinnerManager.hideOverlay();
            }
            if (typeof toast !== 'undefined') {
                toast.error('Failed to load analytics data', 'Error');
            }
        });
</script>
</body>
