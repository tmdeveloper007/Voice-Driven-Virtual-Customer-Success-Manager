<head>
    <meta charset="UTF-8">

        <!-- Favicon & Meta Tags -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='50' font-size='80' text-anchor='middle' dy='.3em'%3E🎙️%3C/text%3E%3C/svg%3E">
    <meta name="description" content="Voice-Driven Virtual Customer Success Manager">
    <meta name="keywords" content="voice assistant, customer success, complaint management">
    <meta name="author" content="Bhakkti Gautam">
    <meta name="theme-color" content="#8b5cf6">
    <meta property="og:title" content="VCSM - Virtual Customer Success Manager">
    <meta property="og:description" content="Voice-driven community support platform">
    <meta name="twitter:card" content="summary_large_image">

</head>
<body>

<!-- Page Load Spinner Overlay -->
<div class="spinner-overlay" id="pageSpinner">
    <div class="spinner"></div>
</div>

<!-- Back to Top Button (created by JS) -->

<!-- Navbar with mobile toggler -->
<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-robot me-2"></i>Virtual Customer Success Manager</a>
        
        <!-- Mobile Toggler Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <!-- Collapsible Navbar Links -->
        <div class="collapse navbar-collapse" id="navMain">
            <div class="navbar-nav ms-auto text-center">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/complaints">Complaints</a>
                <a class="nav-link active" href="/events">Events</a>
                <a class="nav-link" href="/analytics">Analytics</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 mb-3">
        <h4 class="fw-bold mb-0"><i class="fas fa-calendar text-purple me-2"></i>Community Events</h4>
        <button class="btn btn-purple w-100 w-sm-auto" data-bs-toggle="modal" data-bs-target="#addEventModal">
            <span class="btn-spinner"></span>
            <span class="btn-text"><i class="fas fa-plus me-1"></i>Add Event</span>
        </button>
    </div>

    <!-- Events Grid - Responsive: 1 on mobile, 2 on tablet, 3 on desktop -->
    <div class="row g-3">
        <div th:if="${events.empty}" class="col-12 text-center text-muted py-4">
            No events available. Create your first event! 🎉
        </div>
        <div class="col-12 col-md-6 col-lg-4" th:each="e : ${events}">
            <div class="card shadow-sm h-100 event-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-purple" th:text="${e.category}">CAT</span>
                        
                        <span th:if="${e.registrations >= e.maxCapacity}"
                            class="badge bg-danger">
                            Event Full
                        </span>
                    </div>
                    <h6 class="fw-bold" th:text="${e.name}">Event Name</h6>
                    <p class="text-muted small" th:text="${e.description}">Desc</p>
                    <div class="small text-muted">
                        <i class="fas fa-map-marker-alt me-1"></i><span th:text="${e.location}">Location</span>
                    </div>
                    <div class="small text-muted mt-1">
                        <i class="fas fa-clock me-1"></i>
                        <span th:text="${#temporals.format(e.eventDate, 'dd MMM yyyy, hh:mm a')}">Date</span>
                    </div>
                    <div class="mt-2">
                        <div class="progress" style="height:6px;">
                            <div class="progress-bar bg-purple"
                                 th:style="'width:' + (${e.maxCapacity} > 0 ? ${e.registrations * 100 / e.maxCapacity} : 0) + '%'">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <small class="text-muted">
                                <span th:text="${e.registrations}"></span>/<span th:text="${e.maxCapacity}"></span>
                                registered
                            </small>
                            <small class="text-success"
                               th:if="${e.registrations < e.maxCapacity}"
                               th:text="${e.maxCapacity - e.registrations} + ' slots left'">
                            </small>
                            <small class="text-danger"
                               th:if="${e.registrations >= e.maxCapacity}">
                               Full
                            </small>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <button class="btn btn-sm w-100 register-btn mb-1"
                        th:classappend="${e.registrations >= e.maxCapacity}
                        ? 'btn-secondary disabled'
                        : 'btn-purple'"
                        th:disabled="${e.registrations >= e.maxCapacity}"
                        th:data-event-id="${e.id}"
                        th:data-event-registrations="${e.registrations}"
                        th:data-event-capacity="${e.maxCapacity}"
                        onclick="registerEvent(this, ${e.id})">

                        <span class="btn-spinner" style="display:none;"></span>
                        <span class="btn-text">
                            <i class="fas fa-user-plus me-1"></i>
                            <span th:text="${e.registrations >= e.maxCapacity}? 'Event Full': 'Register'"></span>
                        </span>
                    </button>
                    <!-- Delete Event Button -->
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="confirmDeleteEvent(${e.id})">
                        <span class="btn-spinner"></span>
                        <span class="btn-text"><i class="fas fa-trash me-1"></i>Delete Event</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Event Modal - Responsive -->
<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-calendar-plus text-purple me-2"></i>Add New Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Event Name *</label>
                    <input type="text" id="ev_name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea id="ev_desc" class="form-control" rows="2"></textarea>
                </div>
                <div class="row g-2">
                    <div class="col-12 col-sm-6">
                        <label class="form-label">Category</label>
                        <select id="ev_cat" class="form-select">
                            <option>SPORTS</option>
                            <option>CULTURAL</option>
                            <option>HEALTH</option>
                            <option>EDUCATION</option>
                            <option>ENTERTAINMENT</option>
                            <option>SOCIAL</option>
                            <option>OTHER</option>
                        </select>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label">Location</label>
                        <input type="text" id="ev_loc" class="form-control">
                    </div>
                </div>
                <div class="row g-2 mt-1">
                    <div class="col-12 col-sm-6">
                        <label class="form-label">Event Date & Time</label>
                        <input type="datetime-local" id="ev_date" class="form-control">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="form-label">Max Capacity</label>
                        <input type="number" id="ev_cap" class="form-control" value="50">
                    </div>
                </div>
                <div class="mb-3 mt-2">
                    <label class="form-label">Organizer</label>
                    <input type="text" id="ev_org" class="form-control">
                </div>
            </div>
            <div class="modal-footer flex-column flex-sm-row">
                <button type="button" class="btn btn-secondary w-100 w-sm-auto" data-bs-dismiss="modal">
                    <span class="btn-spinner"></span>
                    <span class="btn-text">Cancel</span>
                </button>
                <button type="button" class="btn btn-purple w-100 w-sm-auto" onclick="submitEvent()">
                    <span class="btn-spinner"></span>
                    <span class="btn-text">Create Event</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/spinners.js"></script>

<script src="/js/shortcuts.js"></script>
<script src="/js/toast-notifications.js"></script>
<script src="/js/back-to-top.js"></script>
<script src="/js/typing-indicator.js"></script>
<script src="/js/confirm-dialogs.js"></script>


<script src="/js/confirm-dialogs.js"></script>

<script>
    // Initialize toast
    if (typeof toast !== 'undefined') {
        window.toast = toast;
    }
    
    // Hide spinner when page loads
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const spinner = document.getElementById('pageSpinner');
            if (spinner) {
                spinner.classList.remove('active');
            }
        }, 300);
        
        // Show welcome toast
        setTimeout(function() {
            if (typeof toast !== 'undefined') {
                toast.info('Discover community events!', '📅 Events');
            }
        }, 1000);
    });

    // Register for event with spinner and toast
    function registerEvent(btn, eventId) {
        // Show spinner on the clicked button
        const spinner = btn.querySelector('.btn-spinner');
        const textSpan = btn.querySelector('.btn-text');
        
        if (spinner) spinner.style.display = 'inline-block';
        if (textSpan) textSpan.style.opacity = '0.7';
        btn.disabled = true;
        
        fetch(`/api/events/${eventId}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success || data.id) {
                if (typeof toast !== 'undefined') {
                    toast.success('Successfully registered for event!', '🎉 Registered');
                } else {
                    alert('Successfully registered for event!');
                }
                setTimeout(() => location.reload(), 1500);
            } else {
                if (typeof toast !== 'undefined') {
                    toast.error('Registration failed: ' + (data.message || 'Unknown error'), 'Error');
                } else {
                    alert('Registration failed: ' + (data.message || 'Unknown error'));
                }
                if (spinner) spinner.style.display = 'none';
                if (textSpan) textSpan.style.opacity = '1';
                btn.disabled = false;
            }
        })
        .catch(error => {
            if (typeof toast !== 'undefined') {
                toast.error('Network error. Please try again.', 'Error');
            } else {
                alert('Network error. Please try again.');
            }
            if (spinner) spinner.style.display = 'none';
            if (textSpan) textSpan.style.opacity = '1';
            btn.disabled = false;
        });
    }

    // Submit new event with spinner and toast
    function submitEvent() {
        const btn = event.target.closest('button');
        const spinner = btn.querySelector('.btn-spinner');
        const textSpan = btn.querySelector('.btn-text');
        
        if (spinner) spinner.style.display = 'inline-block';
        if (textSpan) textSpan.style.opacity = '0.7';
        btn.disabled = true;
        
        const eventData = {
            name: document.getElementById('ev_name').value,
            description: document.getElementById('ev_desc').value,
            category: document.getElementById('ev_cat').value,
            location: document.getElementById('ev_loc').value,
            eventDate: document.getElementById('ev_date').value,
            maxCapacity: parseInt(document.getElementById('ev_cap').value),
            organizer: document.getElementById('ev_org').value
        };
        
        if (!eventData.name || !eventData.eventDate) {
            if (typeof toast !== 'undefined') {
                toast.error('Please fill Event Name and Date', 'Validation Error');
            } else {
                alert('Please fill Event Name and Date');
            }
            if (spinner) spinner.style.display = 'none';
            if (textSpan) textSpan.style.opacity = '1';
            btn.disabled = false;
            return;
        }
        
        fetch('/api/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(eventData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                if (typeof toast !== 'undefined') {
                    toast.success(`Event "${eventData.name}" created successfully!`, '🎉 Event Created');
                } else {
                    alert('Event created successfully!');
                }
                setTimeout(() => location.reload(), 1500);
            } else {
                if (typeof toast !== 'undefined') {
                    toast.error('Error creating event', 'Error');
                } else {
                    alert('Error: ' + JSON.stringify(data));
                }
                if (spinner) spinner.style.display = 'none';
                if (textSpan) textSpan.style.opacity = '1';
                btn.disabled = false;
            }
        })
        .catch(error => {
            if (typeof toast !== 'undefined') {
                toast.error('Network error. Please try again.', 'Error');
            } else {
                alert('Network error. Please try again.');
            }
            if (spinner) spinner.style.display = 'none';
            if (textSpan) textSpan.style.opacity = '1';
            btn.disabled = false;
        });
    }


    // Delete event with confirmation dialog
    function confirmDeleteEvent(id) {
        if (typeof showConfirmDialog !== 'undefined') {
            showConfirmDialog({
                title: 'Delete Event',
                message: 'Are you sure you want to delete this event? This action cannot be undone.',
                confirmText: 'Delete',
                simple: false
            }).then((confirmed) => {
                if (confirmed) {
                    deleteEvent(id);
                }
            });
        } else {
            if (confirm('Are you sure you want to delete this event?')) {
                deleteEvent(id);
            }
        }

    // Delete event with confirmation
    function confirmDeleteEvent(id) {
        showConfirmDialog({
            title: 'Delete Event',
            message: 'Are you sure you want to delete this event? This action cannot be undone.',
            confirmText: 'Delete',
            simple: false
        }).then((confirmed) => {
            if (confirmed) {
                deleteEvent(id);
            }
        });

    }

    function deleteEvent(id) {
        fetch(`/api/events/${id}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (response.ok) {

                if (typeof toast !== 'undefined') {
                    toast.success('Event deleted successfully!', '🗑️ Deleted');
                } else {
                    alert('Event deleted successfully!');
                }
                setTimeout(() => location.reload(), 1000);
            } else {
                if (typeof toast !== 'undefined') {
                    toast.error('Error deleting event', 'Error');
                } else {
                    alert('Error deleting event');
                }
            }
        })
        .catch(err => {
            if (typeof toast !== 'undefined') {
                toast.error('Network error. Please try again.', 'Error');
            } else {
                alert('Network error: ' + err.message);
            }

                alert('Event deleted successfully!');
                location.reload();
            } else {
                alert('Error deleting event');
            }
        })
        .catch(err => {
            alert('Network error: ' + err.message);

        });
    }
</script>
</body>
</html>
