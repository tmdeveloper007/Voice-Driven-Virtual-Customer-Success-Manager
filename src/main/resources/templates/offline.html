<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .offline-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }
        .offline-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .offline-icon {
            font-size: 80px;
            color: #8b5cf6;
            margin-bottom: 20px;
        }
        .offline-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .offline-message {
            color: #a0a0b8;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .retry-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">
                <i class="fas fa-wifi-slash"></i>
            </div>
            <h1 class="offline-title">You're Offline</h1>
            <p class="offline-message">
                It looks like you've lost your internet connection.<br>
                Don't worry! Your previous data is still available.<br>
                Once you reconnect, everything will work again.
            </p>
            <button class="retry-btn" onclick="location.reload()">
                <i class="fas fa-sync me-2"></i> Try Again
            </button>
            <div class="mt-3">
                <small class="text-muted">VCSM - Virtual Customer Success Manager</small>
            </div>
        </div>
    </div>
</body>
</html>
