<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilio Voice Call - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand" href="/">VCSM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link active" href="/twilio-demo">Voice Call</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4><i class="fas fa-phone text-purple me-2"></i>Voice Call Integration (Twilio)</h4>
    <p class="text-muted">Make voice calls, send SMS, and use IVR menu</p>

    <div class="row">
        <!-- Call Section -->
        <div class="col-md-6">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-phone me-2 text-purple"></i>Make a Call
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Phone Number (with country code)</label>
                        <input type="tel" id="phoneNumber" class="form-control" placeholder="+1234567890">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">User ID (optional)</label>
                        <input type="text" id="userId" class="form-control" placeholder="1">
                    </div>
                    <button class="btn btn-purple w-100" onclick="makeCall()">
                        <i class="fas fa-phone me-1"></i> Initiate Call
                    </button>
                    <div id="callStatus" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- SMS Section -->
        <div class="col-md-6">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">
                    <i class="fas fa-sms me-2 text-purple"></i>Send SMS
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="smsNumber" class="form-control" placeholder="+1234567890">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea id="smsMessage" class="form-control" rows="3" placeholder="Enter your message..."></textarea>
                    </div>
                    <button class="btn btn-success w-100" onclick="sendSms()">
                        <i class="fas fa-paper-plane me-1"></i> Send SMS
                    </button>
                    <div id="smsStatus" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- IVR Demo -->
    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">
            <i class="fas fa-microphone-alt me-2 text-purple"></i>IVR Menu Demo
        </div>
        <div class="card-body">
            <p class="text-muted">When you call, you'll hear this menu:</p>
            <div class="row">
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100 mb-2" onclick="simulateIvr('1')">
                        <strong>1</strong> File Complaint
                    </button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100 mb-2" onclick="simulateIvr('2')">
                        <strong>2</strong> Check Status
                    </button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100 mb-2" onclick="simulateIvr('3')">
                        <strong>3</strong> Register Event
                    </button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100 mb-2" onclick="simulateIvr('0')">
                        <strong>0</strong> Talk to Agent
                    </button>
                </div>
            </div>
            <div id="ivrResponse" class="alert alert-info mt-3 d-none">
                <i class="fas fa-robot me-2"></i> <span id="ivrText">Selected option: 1 - File Complaint</span>
            </div>
        </div>
    </div>
</div>

<script>
    function makeCall() {
        const toNumber = document.getElementById('phoneNumber').value.trim();
        const userId = document.getElementById('userId').value.trim() || '1';
        
        if (!toNumber) {
            alert('Please enter a phone number');
            return;
        }
        
        document.getElementById('callStatus').innerHTML = '<div class="alert alert-info">📞 Initiating call...</div>';
        
        fetch('/api/twilio/call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                toNumber: toNumber,
                userId: userId
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('callStatus').innerHTML = `
                    <div class="alert alert-success">
                        ✅ Call initiated successfully!<br>
                        Call SID: <code>${data.callSid}</code><br>
                        ${data.message}
                    </div>
                `;
            } else {
                document.getElementById('callStatus').innerHTML = `
                    <div class="alert alert-danger">❌ ${data.error}</div>
                `;
            }
        })
        .catch(err => {
            document.getElementById('callStatus').innerHTML = `
                <div class="alert alert-danger">❌ Error: ${err.message}</div>
            `;
        });
    }

    function sendSms() {
        const toNumber = document.getElementById('smsNumber').value.trim();
        const message = document.getElementById('smsMessage').value.trim();
        
        if (!toNumber) {
            alert('Please enter a phone number');
            return;
        }
        if (!message) {
            alert('Please enter a message');
            return;
        }
        
        document.getElementById('smsStatus').innerHTML = '<div class="alert alert-info">📱 Sending SMS...</div>';
        
        fetch('/api/twilio/sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                toNumber: toNumber,
                message: message
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('smsStatus').innerHTML = `
                    <div class="alert alert-success">
                        ✅ SMS sent successfully!<br>
                        SMS SID: <code>${data.smsSid}</code>
                    </div>
                `;
                document.getElementById('smsMessage').value = '';
            } else {
                document.getElementById('smsStatus').innerHTML = `
                    <div class="alert alert-danger">❌ ${data.error}</div>
                `;
            }
        })
        .catch(err => {
            document.getElementById('smsStatus').innerHTML = `
                <div class="alert alert-danger">❌ Error: ${err.message}</div>
            `;
        });
    }

    function simulateIvr(option) {
        const ivrResponse = document.getElementById('ivrResponse');
        const ivrText = document.getElementById('ivrText');
        
        const options = {
            '1': 'File Complaint - Speak your complaint after the beep',
            '2': 'Check Status - Retrieving your complaint status...',
            '3': 'Register Event - Please enter event ID',
            '0': 'Transfer to Agent - Connecting you to support'
        };
        
        ivrText.textContent = `Selected option: ${option} - ${options[option] || 'Invalid option'}`;
        ivrResponse.classList.remove('d-none');
        
        if (option === '2') {
            // Simulate status check
            setTimeout(() => {
                ivrText.textContent = 'Your complaint status: RESOLVED. Press 1 for main menu.';
            }, 1500);
        }
    }
</script>
</body>
</html>
