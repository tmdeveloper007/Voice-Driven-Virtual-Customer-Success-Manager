# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:vcsmdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Omnidim Voice AI - Replace with your actual API key from omnidim.io
omnidim.api.key=YOUR_OMNIDIM_API_KEY
omnidim.api.base-url=https://api.omnidim.io/v1

# Custom voice model uploads
# voice.model.s3.bucket=
voice.model.s3.prefix=voice-models
voice.model.s3.region=us-east-1

# JWT Security
# Must be at least ~32 bytes for HS256 when using jjwt Keys.hmacShaKeyFor.
security.jwt.secret=change_this_to_a_long_random_secret_at_least_32_chars
security.jwt.expiration-ms=3600000

# Default admin seed (only if username+password are set)
security.admin.username=admin
security.admin.password=admin12345

# Logging
logging.level.com.vcsm=DEBUG

# Voice Biometrics Settings
voice.biometrics.verification.threshold=0.75
voice.biometrics.sample.rate=16000

# Error Handling
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000