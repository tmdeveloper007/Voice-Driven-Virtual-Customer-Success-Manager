# Server
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:mem:vcsmdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.main.allow-bean-definition-overriding=true


# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Omnidim Voice AI - Replace with your actual API key from omnidim.io
omnidim.api.key=YOUR_OMNIDIM_API_KEY
omnidim.api.base-url=https://api.omnidim.io/v1

# Custom voice model uploads
# voice.model.s3.bucket=
voice.model.s3.prefix=voice-models
voice.model.s3.region=us-east-1

# Default admin seed (only if username+password are set)
security.admin.username=admin
security.admin.password=admin12345

# Logging
logging.level.com.vcsm=DEBUG

# Voice Biometrics Settings
voice.biometrics.verification.threshold=0.75
voice.biometrics.sample.rate=16000

# Error Handling
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# ML Service Configuration
ml.service.url=http://localhost:8000
ml.service.enabled=true

# Twilio Configuration
twilio.account.sid=YOUR_ACCOUNT_SID
twilio.auth.token=YOUR_AUTH_TOKEN
twilio.phone.number=+1234567890
twilio.webhook.url=http://your-ngrok-url/api/twilio/webhook


# PWA Configuration
pwa.enabled=true
pwa.cache.strategy=cache-first
pwa.offline.page=/offline

# Rate Limiting Settings
rate.limit.default.capacity=10
rate.limit.default.duration=60
rate.limit.default.refill=10
rate.limit.enabled=true

# JWT Configuration
jwt.secret=your-secret-key-at-least-32-characters-long-for-security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# HMAC Security
security.hmac.secret=dev-secret
